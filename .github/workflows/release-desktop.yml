name: Release Desktop Application

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-desktop"
      - "v[0-9]+.[0-9]+.[0-9]+-*-desktop"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-suffix: windows-x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact-suffix: macos-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-suffix: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-suffix: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare vendored openai-api-rs
        shell: bash
        run: |
          set -euo pipefail

          ROOT_DIR="$GITHUB_WORKSPACE"
          META_FILE="$ROOT_DIR/desktop/src-tauri/vendor-patches/openai-api-rs/UPSTREAM.md"
          VENDOR_DIR="$ROOT_DIR/desktop/src-tauri/vendor/openai-api-rs"
          PATCH_DIR="$ROOT_DIR/desktop/src-tauri/vendor-patches/openai-api-rs"

          if [[ ! -f "$META_FILE" ]]; then
            echo "::error::Vendor metadata file not found: $META_FILE"
            exit 1
          fi

          UPSTREAM_REPO="$(awk -F': ' '$1 == "upstream_repo" { print $2; exit }' "$META_FILE")"
          UPSTREAM_REF="$(awk -F': ' '$1 == "upstream_ref" { print $2; exit }' "$META_FILE")"

          if [[ -z "${UPSTREAM_REPO}" || -z "${UPSTREAM_REF}" ]]; then
            echo "::error::upstream_repo/upstream_ref is empty in $META_FILE"
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          git clone --filter=blob:none "$UPSTREAM_REPO" "$TMP_DIR/upstream"
          git -C "$TMP_DIR/upstream" checkout --quiet "$UPSTREAM_REF"

          shopt -s nullglob
          patches=("$PATCH_DIR"/*.patch)
          shopt -u nullglob
          for patch_file in "${patches[@]}"; do
            echo "Applying patch: $(basename "$patch_file")"
            git -C "$TMP_DIR/upstream" apply --whitespace=nowarn "$patch_file"
          done

          rm -rf "$VENDOR_DIR"
          mkdir -p "$VENDOR_DIR"
          cp -a "$TMP_DIR/upstream/." "$VENDOR_DIR/"
          rm -rf "$VENDOR_DIR/.git"

          test -f "$VENDOR_DIR/Cargo.toml"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate macOS signing secrets
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/vendor-patches/openai-api-rs/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: desktop
        run: pnpm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact-suffix }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: |
          # Strip "refs/tags/v" prefix and "-desktop" suffix
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%-desktop}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Plan Cascade Desktop v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## Plan Cascade Desktop v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Download |
            |----------|----------|
            | Windows (x64) | `.msi` or `.exe` installer |
            | macOS (Intel) | `.dmg` |
            | macOS (Apple Silicon) | `.dmg` |
            | Linux (x64) | `.AppImage` or `.deb` |

            ### Features
            - Graphical interface for Plan Cascade
            - Simple/Expert dual mode
            - Real-time progress visualization
            - Can be used as GUI for Claude Code
